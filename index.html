<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Memoria</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #1e293b;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: white;
        margin: 0;
    }

    h1 {
        margin-top: 20px;
    }

    .game-board {
        display: grid;
        grid-template-columns: repeat(4, 100px);
        gap: 15px;
        margin-top: 30px;
    }

    .card {
        width: 100px;
        height: 100px;
        background: #334155;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        cursor: pointer;
        border-radius: 10px;
        transition: transform 0.3s;
    }

    .card.flipped {
        background: #38bdf8;
        transform: rotateY(180deg);
    }

    .card.matched {
        background: #22c55e;
        cursor: default;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #1d4ed8;
    }
</style>
</head>

<body>

<h1>🃏 Juego de Memoria 🃏</h1>
<div class="game-board" id="gameBoard"></div>
<button onclick="startGame()">Reiniciar Juego</button>

<script>
const emojis = ["🍎","🍌","🍇","🍉","🍒","🥝","🍍","🍓"];
let cards = [];
let firstCard = null;
let secondCard = null;
let lockBoard = false;

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function createBoard() {
    const board = document.getElementById("gameBoard");
    board.innerHTML = "";
    cards = shuffle([...emojis, ...emojis]);

    cards.forEach(emoji => {
        const card = document.createElement("div");
        card.classList.add("card");
        card.dataset.emoji = emoji;
        card.innerHTML = "";
        card.addEventListener("click", flipCard);
        board.appendChild(card);
    });
}

function flipCard() {
    if (lockBoard || this.classList.contains("flipped")) return;

    this.classList.add("flipped");
    this.innerHTML = this.dataset.emoji;

    if (!firstCard) {
        firstCard = this;
        return;
    }

    secondCard = this;
    checkMatch();
}

function checkMatch() {
    if (firstCard.dataset.emoji === secondCard.dataset.emoji) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");
        resetTurn();
    } else {
        lockBoard = true;
        setTimeout(() => {
            firstCard.classList.remove("flipped");
            secondCard.classList.remove("flipped");
            firstCard.innerHTML = "";
            secondCard.innerHTML = "";
            resetTurn();
        }, 1000);
    }
}

function resetTurn() {
    [firstCard, secondCard] = [null, null];
    lockBoard = false;
}

function startGame() {
    firstCard = null;
    secondCard = null;
    lockBoard = false;
    createBoard();
}

startGame();
</script>

<p style="color: rgba(231, 231, 231, 0.067);">Desarrollado por ManuR7 & My friend IA</p>
</body>
</html>
