name: Deploy React Vite App

on:
  push:
    branches: [ "main" ]

permissions: # Otorgar github/settings/Actions/General/Workflow permissions/read and write permissions y [palomita] Allow GitHub Actions to create and approve pull requests
    contents: read
    pages: write
    id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist