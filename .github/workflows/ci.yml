name: CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set npm registry
        run: npm config set registry https://registry.npmjs.org/

      - run: npm install
      - run: npm run build